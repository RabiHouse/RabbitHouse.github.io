<!doctype html>
<html lang="ja" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600&amp;family=Cormorant+Garamond:wght@400;500;600&amp;display=swap" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; }
    body { font-family: 'Noto Sans JP', sans-serif; }
    .font-display { font-family: 'Cormorant Garamond', serif; }
    .slide-track { display: flex; transition: transform 0.4s cubic-bezier(0.25, 0.1, 0.25, 1); }
    .slider-dot.active { background: var(--color-text); }
    .slider-dot { background: var(--color-secondary); }
    .product-card { border: 1px solid var(--color-secondary); }
    .qty-btn { border: 1px solid var(--color-secondary); }
    :root {
      --color-bg: #f7f6f3;
      --color-surface: #ffffff;
      --color-text: #2c2c2c;
      --color-primary: #2c2c2c;
      --color-secondary: #d4d0c8;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full overflow-auto" style="background:var(--color-bg); color:var(--color-text);">
  <div id="app" class="w-full min-h-full flex flex-col"><!-- Header -->
   <header class="w-full py-8 text-center border-b" style="border-color:var(--color-secondary); background:var(--color-surface);">
    <h1 id="shop-name" class="font-display text-4xl md:text-5xl font-500 tracking-wide" style="color:var(--color-text);">Your Shop</h1>
    <p id="shop-tagline" class="mt-2 text-sm tracking-widest uppercase opacity-60">Handmade Works</p>
   </header><!-- Products -->
   <main class="flex-1 w-full max-w-5xl mx-auto px-4 py-12">
    <div id="product-list" class="grid grid-cols-1 gap-16"><!-- Products rendered by JS -->
    </div>
   </main><!-- Footer -->
   <footer class="w-full py-6 text-center text-xs opacity-40 border-t" style="border-color:var(--color-secondary);">
    <p>© 2025 Your Shop. All rights reserved.</p>
   </footer>
  </div>
  <script>
// ============================================================
// 商品データ — ここを編集するだけで商品を追加できます
// ============================================================
const PRODUCTS = [
  {
    id: "product-1",
    title: "Rabbitflower Doll#91 [water color]",
    price: 3800,
    description: "ペン・水彩絵の具・アクリル絵の具などを使った原画イラスト
Original artwork using pen, watercolor, acrylic paint, etc.

NFT:
https://xrp.cafe/nft/000827108D3BB1B5DD412C0BC897016FC961D66C06CB9E9CB7ECCEEB04DB464F

A5 size
Clairefontaine watercolor paper
Copic Multiliner
Holbein watercolor paints
Liquitex acrylic paints
Turner acrylic paints

The back of the artwork is hand-signed and stamped by the artist to guarantee its authenticity.

Since we also sell on other websites, there is a possibility that the item may be out of stock depending on the timing. In that case, we may contact you to discuss cancellation or other options, so please understand.

※送料を抑えるため、フレームはついておりません。
* To keep shipping costs down, the picture frame is not included.

※ お使いのディスプレイ環境によっては、実際の作品と画像の色味に若干の違いが生じる場合があります。
* There may be slight color differences between the actual product and the image depending on your display environment.",
    details: [
      { label: "サイズ", value: "A5" },
      { label: "イラスト", value: "原画", "ペン画", "水彩画","オリジナル" },
      { label: "制作年", value: "2026" },
    ],
    // 画像URLを差し替えてください（3枚推奨）
    images: [
      "https://images.unsplash.com/photo-1578749556568-bc2c40e68b61?w=600&q=80",
      "https://images.unsplash.com/photo-1578749556568-bc2c40e68b61?w=600&q=80",
      "https://images.unsplash.com/photo-1493106641515-6b5631de4bb9?w=600&q=80",
    ],
    maxQty: 5,
    // PayPal.meリンク例: https://www.paypal.me/yourname/3800JPY
    paypalLink: "https://www.paypal.com/ncp/payment/CEBVE2U6N9EV2",
    soldOut: false,
  },
  {
    id: "product-2",
    title: "作品タイトル B",
    price: 5200,
    description: "二つ目の作品の説明です。世界観やこだわりのポイントを自由に書いてください。",
    details: [
      { label: "サイズ", value: "20 × 15 cm" },
      { label: "素材", value: "木材・漆" },
      { label: "制作年", value: "2024" },
    ],
    images: [
      "https://images.unsplash.com/photo-1513519245088-0e12902e35a6?w=600&q=80",
      "https://images.unsplash.com/photo-1460411794035-42aac080490a?w=600&q=80",
      "https://images.unsplash.com/photo-1526045612212-70caf35c14df?w=600&q=80",
    ],
    maxQty: 3,
    paypalLink: "https://www.paypal.me/yourname/5200JPY",
    soldOut: false,
  },
];

// ============================================================
// Rendering
// ============================================================
const quantities = {};

function renderProducts() {
  const container = document.getElementById('product-list');
  container.innerHTML = '';

  PRODUCTS.forEach(product => {
    if (!(product.id in quantities)) quantities[product.id] = 1;
    const qty = quantities[product.id];

    const card = document.createElement('div');
    card.className = 'product-card rounded-sm overflow-hidden';
    card.style.background = 'var(--color-surface)';

    const totalPrice = product.price * qty;
    const payLink = product.paypalLink.replace(/\/[\d]+JPY/, `/${totalPrice}JPY`);

    card.innerHTML = `
      <div class="md:flex">
        <!-- Slider -->
        <div class="md:w-1/2 relative overflow-hidden" style="aspect-ratio:4/3;">
          <div class="slide-track h-full" data-slider="${product.id}" style="width:${product.images.length * 100}%;">
            ${product.images.map(src => `
              <div class="h-full" style="width:${100 / product.images.length}%;">
                <img src="${src}" alt="${product.title}" loading="lazy" class="w-full h-full object-cover"
                  onerror="this.style.background='var(--color-secondary)';this.alt='Image unavailable';">
              </div>
            `).join('')}
          </div>
          ${product.images.length > 1 ? `
          <button class="absolute left-2 top-1/2 -translate-y-1/2 w-8 h-8 rounded-full flex items-center justify-center opacity-50 hover:opacity-100 transition-opacity" style="background:var(--color-surface);" onclick="slide('${product.id}',-1)">
            <i data-lucide="chevron-left" style="width:16px;height:16px;"></i>
          </button>
          <button class="absolute right-2 top-1/2 -translate-y-1/2 w-8 h-8 rounded-full flex items-center justify-center opacity-50 hover:opacity-100 transition-opacity" style="background:var(--color-surface);" onclick="slide('${product.id}',1)">
            <i data-lucide="chevron-right" style="width:16px;height:16px;"></i>
          </button>
          <div class="absolute bottom-3 left-1/2 -translate-x-1/2 flex gap-1.5">
            ${product.images.map((_, i) => `<button class="slider-dot w-2 h-2 rounded-full ${i === 0 ? 'active' : ''}" onclick="goTo('${product.id}',${i})"></button>`).join('')}
          </div>
          ` : ''}
        </div>

        <!-- Info -->
        <div class="md:w-1/2 p-6 md:p-8 flex flex-col justify-between">
          <div>
            <h2 class="font-display text-2xl md:text-3xl font-500">${product.title}</h2>
            <p class="mt-1 text-xl font-light">¥${product.price.toLocaleString()}<span class="text-xs ml-1 opacity-50">（税込）</span></p>
            <p class="mt-4 text-sm leading-relaxed opacity-70">${product.description}</p>
            <dl class="mt-4 text-sm space-y-1">
              ${product.details.map(d => `
                <div class="flex gap-2">
                  <dt class="opacity-40 w-16 shrink-0">${d.label}</dt>
                  <dd>${d.value}</dd>
                </div>
              `).join('')}
            </dl>
          </div>

          <div class="mt-6 pt-4 border-t" style="border-color:var(--color-secondary);">
            ${product.soldOut ? `
              <p class="text-center py-3 text-sm tracking-widest opacity-40">SOLD OUT</p>
            ` : `
              <!-- Quantity -->
              <div class="flex items-center gap-3 mb-4">
                <span class="text-xs opacity-50 uppercase tracking-wider">数量</span>
                <button class="qty-btn w-7 h-7 rounded-sm flex items-center justify-center text-sm hover:opacity-70 transition-opacity" onclick="changeQty('${product.id}',-1)">−</button>
                <span class="w-6 text-center text-sm" id="qty-${product.id}">${qty}</span>
                <button class="qty-btn w-7 h-7 rounded-sm flex items-center justify-center text-sm hover:opacity-70 transition-opacity" onclick="changeQty('${product.id}',1)">+</button>
                <span class="text-xs opacity-40 ml-auto">合計 ¥${totalPrice.toLocaleString()}</span>
              </div>
              <!-- PayPal -->
              <a href="${payLink}" target="_blank" rel="noopener noreferrer"
                class="block w-full text-center py-3 rounded-sm text-sm tracking-wider transition-opacity hover:opacity-80"
                style="background:var(--color-primary); color:var(--color-surface);">
                PayPalで購入する
              </a>
              <p class="mt-2 text-center text-xs opacity-30">※ PayPalの決済ページに移動します</p>
            `}
          </div>
        </div>
      </div>
    `;
    container.appendChild(card);
  });

  lucide.createIcons();
}

// Slider state
const sliderIndex = {};

function slide(id, dir) {
  const product = PRODUCTS.find(p => p.id === id);
  if (!product) return;
  const max = product.images.length - 1;
  sliderIndex[id] = Math.max(0, Math.min(max, (sliderIndex[id] || 0) + dir));
  updateSlider(id);
}

function goTo(id, i) {
  sliderIndex[id] = i;
  updateSlider(id);
}

function updateSlider(id) {
  const idx = sliderIndex[id] || 0;
  const track = document.querySelector(`[data-slider="${id}"]`);
  if (track) track.style.transform = `translateX(-${idx * (100 / PRODUCTS.find(p => p.id === id).images.length)}%)`;
  // Update dots
  const card = track.closest('.product-card');
  card.querySelectorAll('.slider-dot').forEach((dot, i) => {
    dot.classList.toggle('active', i === idx);
  });
}

function changeQty(id, dir) {
  const product = PRODUCTS.find(p => p.id === id);
  if (!product) return;
  quantities[id] = Math.max(1, Math.min(product.maxQty, (quantities[id] || 1) + dir));
  renderProducts();
  // Restore slider position
  if (sliderIndex[id]) updateSlider(id);
}

// ============================================================
// Element SDK
// ============================================================
const defaultConfig = {
  shop_name: "Your Shop",
  shop_tagline: "Handmade Works",
  background_color: "#f7f6f3",
  surface_color: "#ffffff",
  text_color: "#2c2c2c",
  primary_color: "#2c2c2c",
  secondary_color: "#d4d0c8",
  font_family: "Noto Sans JP",
  font_size: 14,
};

function applyConfig(config) {
  const c = { ...defaultConfig, ...config };

  document.documentElement.style.setProperty('--color-bg', c.background_color);
  document.documentElement.style.setProperty('--color-surface', c.surface_color);
  document.documentElement.style.setProperty('--color-text', c.text_color);
  document.documentElement.style.setProperty('--color-primary', c.primary_color);
  document.documentElement.style.setProperty('--color-secondary', c.secondary_color);

  document.body.style.background = c.background_color;
  document.body.style.color = c.text_color;
  document.body.style.fontFamily = `${c.font_family}, 'Noto Sans JP', sans-serif`;
  document.body.style.fontSize = `${c.font_size}px`;

  const nameEl = document.getElementById('shop-name');
  const tagEl = document.getElementById('shop-tagline');
  if (nameEl) nameEl.textContent = c.shop_name;
  if (tagEl) tagEl.textContent = c.shop_tagline;

  const header = document.querySelector('header');
  if (header) { header.style.borderColor = c.secondary_color; header.style.background = c.surface_color; }
  const footer = document.querySelector('footer');
  if (footer) footer.style.borderColor = c.secondary_color;
}

if (window.elementSdk) {
  window.elementSdk.init({
    defaultConfig,
    onConfigChange: async (config) => applyConfig(config),
    mapToCapabilities: (config) => {
      const c = { ...defaultConfig, ...config };
      const mk = (key) => ({
        get: () => c[key] || defaultConfig[key],
        set: (v) => { c[key] = v; window.elementSdk.setConfig({ [key]: v }); }
      });
      return {
        recolorables: [mk('background_color'), mk('surface_color'), mk('text_color'), mk('primary_color'), mk('secondary_color')],
        borderables: [],
        fontEditable: mk('font_family'),
        fontSizeable: mk('font_size'),
      };
    },
    mapToEditPanelValues: (config) => {
      const c = { ...defaultConfig, ...config };
      return new Map([
        ["shop_name", c.shop_name],
        ["shop_tagline", c.shop_tagline],
      ]);
    }
  });
}

renderProducts();
</script>
