<!doctype html>
<html lang="ja" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600&amp;family=Cormorant+Garamond:wght@400;500;600&amp;display=swap" rel="stylesheet">
  <style>
html, body { height: 100%; margin: 0; }
body { font-family: 'Noto Sans JP', sans-serif; }
.font-display { font-family: 'Cormorant Garamond', serif; }
.slide-track { display: flex; transition: transform 0.4s cubic-bezier(0.25, 0.1, 0.25, 1); }
.slider-dot.active { background: var(--color-text); }
.slider-dot { background: var(--color-secondary); }
.product-card { border: 1px solid var(--color-secondary); }
.qty-btn { border: 1px solid var(--color-secondary); }
:root {
--color-bg: #f7f6f3;
--color-surface: #ffffff;
--color-text: #2c2c2c;
--color-primary: #2c2c2c;
--color-secondary: #d4d0c8;
}
</style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/element_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full overflow-auto" style="background:var(--color-bg); color:var(--color-text);">
  <div id="app" class="w-full min-h-full flex flex-col">
   <header class="w-full py-8 text-center border-b" style="border-color:var(--color-secondary); background:var(--color-surface);">
    <h1 id="shop-name" class="font-display text-4xl md:text-5xl font-500 tracking-wide">Your Shop</h1>
    <p id="shop-tagline" class="mt-2 text-sm tracking-widest uppercase opacity-60">Handmade Works</p>
   </header>
   <main class="flex-1 w-full max-w-5xl mx-auto px-4 py-12">
    <div id="product-list" class="grid grid-cols-1 gap-16"></div>
   </main>
   <footer class="w-full py-6 text-center text-xs opacity-40 border-t">
    <p>© 2025 Your Shop. All rights reserved.</p>
   </footer>
  </div>
  <script>
const PRODUCTS = [
  {
    id: "product-1",
    title: "Rabbitflower Doll#91 [water color]",
    price: ¥6,800 JPY,
    description: "Original artwork using pen, watercolor, acrylic paint, etc.",
    details: [
      { label: "サイズ", value: "A5" },
      { label: "イラスト", value: "原画, ペン画, 水彩画, オリジナル" },
      { label: "制作年", value: "2026" }
    ],
    images: [
      "https://via.placeholder.com/800x600?text=Ceramic+Vase+1",
      "https://via.placeholder.com/800x600?text=Ceramic+Vase+2",
      "https://via.placeholder.com/800x600?text=Ceramic+Vase+3"
    ],
    maxQty: 1,
    paypalLink: "https://www.paypal.com/ncp/payment/CEBVE2U6N9EV2",
    soldOut: false
  },
  {
    id: "product-2",
    title: "Wooden Bowl",
    price: 4500,
    description: "Handcrafted wooden bowl with natural finish",
    details: [
      { label: "Diameter", value: "20cm" },
      { label: "Material", value: "Walnut Wood" },
      { label: "Treatment", value: "Natural Oil" }
    ],
    images: [
      "https://images.unsplash.com/photo-1578500494198-246f612d03b3?w=800",
      "https://images.unsplash.com/photo-1565799033546-5f0905e5a948?w=800",
      "https://images.unsplash.com/photo-1587462954470-df1b58fb88c9?w=800"
    ],
    maxQty: 3,
    paypalLink: "https://www.paypal.me/yourname/4500JPY",
    soldOut: false
  }
];

const sliderStates = {};
let quantities = {};

function init() {
  PRODUCTS.forEach(product => {
    quantities[product.id] = 1;
    sliderStates[product.id] = 0;
  });
  renderProducts();
}

function renderProducts() {
  const productList = document.getElementById('product-list');
  productList.innerHTML = PRODUCTS.map(product => {
    const currentSlide = sliderStates[product.id] || 0;
    return `
    <div class="product-card p-8" data-product-id="${product.id}" style="background:var(--color-surface);">
      <div class="relative mb-8">
        <div class="overflow-hidden bg-gray-100 rounded" style="aspect-ratio: 4/3;">
          <div class="slide-track" style="width: ${product.images.length * 100}%; transform: translateX(-${currentSlide * 100 / product.images.length}%);">
            ${product.images.map((img, idx) => `
            <img src="${img}" alt="Product image ${idx + 1}" loading="lazy" 
            style="width: ${100 / product.images.length}%; object-fit: cover; flex-shrink: 0;">
            `).join('')}
          </div>
        </div>
        
        ${product.images.length > 1 ? `
        <button onclick="prevSlide('${product.id}')" class="absolute left-2 top-1/2 -translate-y-1/2 bg-white/80 p-2 rounded hover:bg-white transition" style="color:var(--color-text);">
          <i data-lucide="chevron-left" style="width:20px; height:20px;"></i>
        </button>
        <button onclick="nextSlide('${product.id}')" class="absolute right-2 top-1/2 -translate-y-1/2 bg-white/80 p-2 rounded hover:bg-white transition" style="color:var(--color-text);">
          <i data-lucide="chevron-right" style="width:20px; height:20px;"></i>
        </button>
        <div class="flex gap-2 justify-center mt-3">
          ${product.images.map((_, idx) => `
          <button onclick="goToSlide('${product.id}', ${idx})" 
          class="slider-dot w-2 h-2 rounded-full transition ${idx === currentSlide ? 'active' : ''}"
          style="cursor:pointer;">
          </button>
          `).join('')}
        </div>
        ` : ''}
      </div>

      <div class="space-y-6">
        <div>
          <h2 class="font-display text-2xl md:text-3xl font-500 tracking-wide mb-2">${product.title}</h2>
          <p class="text-sm opacity-70">${product.description}</p>
        </div>

        ${product.details.length > 0 ? `
        <div class="text-sm space-y-1 py-4" style="border-top: 1px solid var(--color-secondary); border-bottom: 1px solid var(--color-secondary);">
          ${product.details.map(detail => `
          <div class="flex justify-between">
            <span class="opacity-60">${detail.label}</span>
            <span class="font-500">${detail.value}</span>
          </div>
          `).join('')}
        </div>
        ` : ''}

        <div class="space-y-4">
          <div class="flex justify-between items-baseline">
            <span class="text-sm opacity-60">Price</span>
            <span id="price-${product.id}" class="font-display text-3xl font-600">¥${product.price.toLocaleString()}</span>
          </div>

          <div class="flex items-center gap-4">
            <span class="text-sm opacity-60">Quantity</span>
            <div class="flex gap-2">
              <button onclick="changeQty('${product.id}', -1)" class="qty-btn w-10 h-10 flex items-center justify-center rounded hover:opacity-70 transition" style="color:var(--color-text);">
                <i data-lucide="minus" style="width:18px; height:18px;"></i>
              </button>
              <input type="number" id="qty-${product.id}" value="1" min="1" max="${product.maxQty}" class="w-12 text-center border rounded" style="border-color:var(--color-secondary); color:var(--color-text);" onchange="updateQty('${product.id}', this.value)">
              <button onclick="changeQty('${product.id}', 1)" class="qty-btn w-10 h-10 flex items-center justify-center rounded hover:opacity-70 transition" style="color:var(--color-text);">
                <i data-lucide="plus" style="width:18px; height:18px;"></i>
              </button>
            </div>
          </div>

          <div class="flex justify-between items-baseline py-4" style="border-top: 1px solid var(--color-secondary);">
            <span class="text-sm opacity-60">Total</span>
            <span id="total-${product.id}" class="font-display text-3xl font-600">¥${product.price.toLocaleString()}</span>
          </div>

          ${!product.soldOut ? `
          <a href="javascript:void(0);" onclick="goToPayPal('${product.id}')" id="paypal-${product.id}" 
          class="block w-full py-3 rounded text-center text-white font-500 transition hover:opacity-90"
          style="background:var(--color-primary);">
          Pay with PayPal
          </a>
          ` : `
          <div class="w-full py-3 text-center rounded opacity-50">Sold Out</div>
          `}
        </div>
      </div>
    </div>
    `;
  }).join('');

  lucide.createIcons();
}

function nextSlide(productId) {
  const product = PRODUCTS.find(p => p.id === productId);
  sliderStates[productId] = (sliderStates[productId] + 1) % product.images.length;
  updateSlider(productId);
}

function prevSlide(productId) {
  const product = PRODUCTS.find(p => p.id === productId);
  sliderStates[productId] = (sliderStates[productId] - 1 + product.images.length) % product.images.length;
  updateSlider(productId);
}

function goToSlide(productId, idx) {
  sliderStates[productId] = idx;
  updateSlider(productId);
}

function updateSlider(productId) {
  const product = PRODUCTS.find(p => p.id === productId);
  const idx = sliderStates[productId];
  
  const card = document.querySelector(`[data-product-id="${productId}"]`);
  if (card) {
    const track = card.querySelector('.slide-track');
    if (track) {
      track.style.transform = `translateX(-${idx * 100 / product.images.length}%)`;
    }
    
    const dots = card.querySelectorAll('.slider-dot');
    dots.forEach((dot, i) => {
      dot.classList.toggle('active', i === idx);
    });
  }
}

function changeQty(productId, delta) {
  const product = PRODUCTS.find(p => p.id === productId);
  const input = document.getElementById(`qty-${productId}`);
  let newQty = parseInt(input.value) + delta;
  newQty = Math.max(1, Math.min(newQty, product.maxQty));
  input.value = newQty;
  updateQty(productId, newQty);
}

function updateQty(productId, value) {
  const product = PRODUCTS.find(p => p.id === productId);
  const qty = Math.max(1, Math.min(parseInt(value), product.maxQty));
  quantities[productId] = qty;

  const total = product.price * qty;
  document.getElementById(`price-${productId}`).textContent = `¥${product.price.toLocaleString()}`;
  document.getElementById(`total-${productId}`).textContent = `¥${total.toLocaleString()}`;
  document.getElementById(`qty-${productId}`).value = qty;
}

function goToPayPal(productId) {
  const product = PRODUCTS.find(p => p.id === productId);
  const qty = quantities[productId] || 1;
  const total = product.price * qty;

  const paypalUrl = product.paypalLink.replace(/\/[\d]+JPY/, `/${total}JPY`);
  window.open(paypalUrl, '_blank', 'noopener,noreferrer');
}

init();
</script>
