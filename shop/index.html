<!doctype html>
<html lang="ja" class="h-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rabbitflower Shop</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP&family=Cormorant+Garamond&display=swap" rel="stylesheet">

<style>
html, body { height: 100%; margin: 0; }
body { font-family: 'Noto Sans JP', sans-serif; }
.font-display { font-family: 'Cormorant Garamond', serif; }

:root {
--color-bg: #f7f6f3;
--color-surface: #ffffff;
--color-text: #2c2c2c;
--color-primary: #2c2c2c;
--color-secondary: #d4d0c8;
}

.slide-track { display:flex; transition:0.4s; }
.slider-dot.active { background: var(--color-text); }
.slider-dot { background: var(--color-secondary); }
.product-card { border:1px solid var(--color-secondary); }
.qty-btn { border:1px solid var(--color-secondary); }
</style>
</head>

<body style="background:var(--color-bg); color:var(--color-text);">

<div id="app">
<header class="text-center py-8 border-b">
<h1 class="font-display text-4xl">Rabbitflower Shop</h1>
<p class="text-sm opacity-60">Handmade Works</p>
</header>

<main class="max-w-5xl mx-auto p-6">
<div id="product-list"></div>
</main>

<footer class="text-center text-xs opacity-40 py-6">
© 2026 Rabbitflower
</footer>
</div>

<script>
const PRODUCTS = [
{
id:"p1",
title:"Rabbitflower Doll#91",
price:6800,
images:["https://via.placeholder.com/800x600"],
maxQty:1,
paypalLink:"https://www.paypal.me/yourname/6800JPY"
}
];

let quantities={};

function init(){
PRODUCTS.forEach(p=>quantities[p.id]=1);
render();
}

function render(){
const el=document.getElementById("product-list");

el.innerHTML=PRODUCTS.map(p=>`
<div class="product-card p-6 mb-10">

<img src="${p.images[0]}" class="w-full mb-4">

<h2 class="text-2xl font-display">${p.title}</h2>

<p class="text-xl mt-2">¥${p.price}</p>

<input type="number" value="1" min="1" max="${p.maxQty}"
onchange="updateQty('${p.id}',this.value)">

<button onclick="buy('${p.id}')"
class="block mt-4 bg-black text-white px-4 py-2">
Pay with PayPal
</button>

</div>
`).join("");

lucide.createIcons();
}

function updateQty(id,val){
quantities[id]=parseInt(val);
}

function buy(id){
const p=PRODUCTS.find(x=>x.id===id);
const total=p.price*quantities[id];
window.open(p.paypalLink.replace("6800",total));
}

init();
</script>

</body>
</html>
