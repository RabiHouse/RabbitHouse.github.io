---
layout: default
---

<header>
  <h1>articles</h1>
</header>

<section class="content">

  {% for post in site.posts limit:10 %}
    <p>
      <a href="{{ site.baseurl }}{{ post.url }}">
        {{ post.date | date: "%Y.%m.%d" }}<br>
        {{ post.title }}
      </a>
    </p>
  {% endfor %}

</section>

<div class="tags">
  {% assign tags = site.tags %}
  {% for tag in tags %}
    <a href="{{ site.baseurl }}/tag/{{ tag[0] }}">{{ tag[0] }}</a>
  {% endfor %}
</div>
