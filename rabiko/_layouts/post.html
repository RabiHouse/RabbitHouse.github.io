---
layout: default
---

<header>
  <p class="date">{{ page.date | date: "%Y.%m.%d" }}</p>
  <h1>{{ page.title }}</h1>
</header>

<article class="content">
  {{ content }}
</article>

<div class="tags">
  {% for tag in page.tags %}
    <a href="{{ site.baseurl }}/tag/{{ tag }}">{{ tag }}</a>
  {% endfor %}
</div>

<div class="share">
  <a href="https://twitter.com/share?url={{ site.url }}{{ site.baseurl }}{{ page.url }}">share</a>
</div>

<nav class="pager">
  {% if page.previous %}
    <a href="{{ site.baseurl }}{{ page.previous.url }}">← prev</a>
  {% endif %}
  {% if page.next %}
    <a href="{{ site.baseurl }}{{ page.next.url }}">next →</a>
  {% endif %}
</nav>
